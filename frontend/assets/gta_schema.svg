  <text x="660" y="334" fill="#3a5a7a" font-size="9">Vitesse turbine</text>
  <text x="870" y="334" fill="#aa80ff" font-size="9" text-anchor="end">6435 RPM</text>
  <text x="660" y="349" fill="#3a5a7a" font-size="9">Puissance active</text>
