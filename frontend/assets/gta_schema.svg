  </text>
  <rect x="700" y="8" width="185" height="20" rx="3"
        fill="#00e67622" stroke="#00e676" stroke-width="1"/>
  <text x="792" y="21" fill="#00e676" font-size="9" text-anchor="middle" letter-spacing="1">
    ÉTAT NOMINAL
  </text>

