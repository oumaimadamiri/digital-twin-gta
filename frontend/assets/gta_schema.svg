<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 420"
     width="900" height="420"
     style="font-family:'Share Tech Mono',monospace;background:#080c10">

  <defs>
    <linearGradient id="g-hp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00b4ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff7043" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="g-bp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#aa80ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00b4ff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="f-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Grille de fond -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,180,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Fond grille -->
  <rect width="900" height="420" fill="url(#grid)"/>

  <!-- ── TITRE ─────────────────────────────────────────────────── -->
  <text x="16" y="22" fill="#3a5a7a" font-size="10" letter-spacing="2">
