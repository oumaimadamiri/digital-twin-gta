  <text x="870" y="289" fill="#6a96bb" font-size="9" text-anchor="end">4.20 bar</text>
  <text x="660" y="304" fill="#3a5a7a" font-size="9">Température BP</text>
  <text x="870" y="304" fill="#6a96bb" font-size="9" text-anchor="end">180.0 °C</text>
  <text x="660" y="319" fill="#3a5a7a" font-size="9">Débit vapeur HP</text>
